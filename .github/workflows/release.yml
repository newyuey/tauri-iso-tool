name: Release

# 每当推送 v 开头的 tag 时触发（如 v0.1.0）
on:
  push:
    tags:
      - 'v*'

# 确保有权限创建 Release
permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'
          - platform: 'windows-latest'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 安装 npm 依赖
        run: npm install

      - name: 编译并发布到 GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ISO Maker ${{ github.ref_name }}'
          releaseBody: '请查看下方 Assets 下载对应平台的安装包。'
          releaseDraft: false
          prerelease: false
          # 本项目前端是静态文件，无需 npm run build
          beforeBuildCommand: ''
